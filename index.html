<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Forge Digital Technologies</title>
    <meta name="description" content="We Build Digital Products That Perform">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- React & Babel -->
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    screens: {
                        'xs': '475px',
                    }
                }
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --bg-main: #06060c;
            --bg-card: #0d0d1a;
            --primary: #5a32fa;
            --secondary: #3b82f6;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border-color: #1f1f3a;
        }
    }

    @layer base {
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }
    }

    @layer utilities {
        .text-gradient {
            @apply bg-clip-text text-transparent bg-gradient-to-r from-[#5a32fa] to-[#9b6dff];
        }
        .bg-gradient-primary {
            @apply bg-gradient-to-r from-[#5a32fa] to-[#8b5cf6];
        }
        .card-border {
            @apply border border-[#1f1f3a] rounded-xl bg-[#0d0d1a];
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        /* Scroll Reveal Animations */
        .reveal {
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.17, 0.55, 0.55, 1);
        }
        .reveal-up { transform: translateY(20px); }
        .reveal-down { transform: translateY(-20px); }
        .reveal-left { transform: translateX(-20px); }
        .reveal-right { transform: translateX(20px); }
        
        .reveal.active {
            opacity: 1;
            transform: translate(0, 0);
        }

        /* Staggered Delay Utilities */
        .delay-100 { transition-delay: 100ms; }
        .delay-200 { transition-delay: 200ms; }
        .delay-300 { transition-delay: 300ms; }
        .delay-400 { transition-delay: 400ms; }
        .delay-500 { transition-delay: 500ms; }
    }
    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
        100% { transform: translateY(0px); }
    }
    </style>
</head>
<body class="antialiased overflow-x-hidden">
    <div id="root"></div>

    <!-- Components -->
    <script type="text/babel" src="components/Navbar.js"></script>
    <script type="text/babel" src="components/Hero.js"></script>
    <script type="text/babel" src="components/Services.js"></script>
    <script type="text/babel" src="components/About.js"></script>
    <script type="text/babel" src="components/AboutPage.js"></script>
    <script type="text/babel" src="components/Process.js"></script>
    <script type="text/babel" src="components/Portfolio.js"></script>
    <script type="text/babel" src="components/Features.js"></script>
    <script type="text/babel" src="components/CTA.js"></script>
    <script type="text/babel" src="components/ContactPage.js"></script>
    <script type="text/babel" src="components/ServiceDetailPage.js"></script>
    <script type="text/babel" src="components/ProjectDetailPage.js"></script>
    <script type="text/babel" src="components/Footer.js"></script>

    <!-- Main App -->
    <script type="text/babel" src="app.js"></script>
</body>
</html>
